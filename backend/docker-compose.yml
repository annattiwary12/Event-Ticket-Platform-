version: "3.9"

services:
  db:
    image: postgres:17
    container_name: event-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mydb
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    volumes:
      - pg-data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: event-adminer
    restart: always
    ports:
      - "8890:8080"
    depends_on:
      - db

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.1
    container_name: event-keycloak
    restart: always
    command: start-dev
    ports:
      - "9091:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/mydb
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: admin
    depends_on:
      - db
    volumes:
      - keycloak-data:/opt/keycloak/data

volumes:
  pg-data:
  keycloak-data: